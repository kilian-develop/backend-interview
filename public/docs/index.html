<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 준비 가이드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg:       #05070f;
    --surface:  #0a0e1a;
    --border:   #1a2540;
    --text:     #dde4f0;
    --muted:    #3d5070;
    --dim:      #8aa0c0;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.025) 1px, transparent 1px);
    background-size: 52px 52px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 55% 45% at 15% 25%, rgba(59,130,246,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 75%, rgba(168,85,247,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 35% at 70% 15%, rgba(6,182,212,0.05) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 60px 22px 100px;
    position: relative; z-index: 1;
  }

  /* ── Hero ── */
  .hero { text-align: center; margin-bottom: 72px; }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 18px;
    opacity: 0; animation: fadeUp .6s ease forwards .1s;
  }

  .hero h1 {
    font-size: clamp(28px, 5.5vw, 52px);
    font-weight: 900; line-height: 1.15; margin-bottom: 18px;
    opacity: 0; animation: fadeUp .6s ease forwards .3s;
  }

  .hero h1 em {
    font-style: normal;
    background: linear-gradient(120deg, #06b6d4, #3b82f6, #a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: 14px; color: var(--dim); line-height: 1.9;
    max-width: 480px; margin: 0 auto;
    opacity: 0; animation: fadeUp .6s ease forwards .5s;
  }

  /* ── 분류 배지 ── */
  .category-badge {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid; border-radius: 8px;
    padding: 10px 18px; margin-bottom: 48px;
    opacity: 0; animation: fadeUp .6s ease forwards .7s;
  }

  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }

  .badge-text {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 2px;
  }

  /* ── 요약 카운트 ── */
  .summary-bar {
    display: flex; gap: 24px; flex-wrap: wrap;
    margin-bottom: 56px;
    opacity: 0; animation: fadeUp .6s ease forwards .9s;
  }

  .summary-item { display: flex; flex-direction: column; gap: 4px; }

  .summary-num {
    font-family: var(--mono);
    font-size: 26px; font-weight: 700;
  }

  .summary-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  .summary-divider {
    width: 1px; background: var(--border); align-self: stretch;
  }

  /* ── 카테고리 섹션 ── */
  .category { margin-bottom: 56px; }

  .section-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    padding: 4px 10px; border: 1px solid; border-radius: 4px;
  }

  .section-title { font-size: 20px; font-weight: 700; }

  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* ── 카드 그리드 ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  /* ── 토픽 카드 ── */
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 20px;
    text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; gap: 10px;
    transition: transform .25s, box-shadow .25s, border-color .25s;
    position: relative; overflow: hidden;
  }

  .topic-card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0; transition: opacity .25s; border-radius: 14px;
  }

  .topic-card:hover { transform: translateY(-4px); }
  .topic-card:hover::before { opacity: 1; }

  .card-tag {
    font-family: var(--mono);
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted);
  }

  .card-icon { font-size: 24px; line-height: 1; }

  .card-title { font-size: 14px; font-weight: 700; line-height: 1.4; }

  .card-desc { font-size: 12px; color: var(--dim); line-height: 1.7; margin-top: 2px; }

  .card-arrow {
    margin-top: auto;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    transition: color .25s, gap .25s;
  }

  .topic-card:hover .card-arrow { gap: 10px; }

  /* ── Footer ── */
  footer {
    margin-top: 80px; padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }

  .footer-left { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .footer-right { font-size: 12px; color: var(--muted); }

  /* ── 애니메이션 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .anim { opacity: 0; animation: fadeUp .5s ease forwards; }

  @media (max-width: 640px) {
    .card-grid { grid-template-columns: 1fr; }
    .summary-bar { gap: 16px; }
    .summary-divider { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <div class="hero-eyebrow">Interview Prep · 2026</div>
    <h1>백엔드 개발자<br><em>면접 준비 가이드</em></h1>
    <p class="hero-desc">핵심 개념을 카테고리별로 정리했습니다.<br>주제를 클릭해 상세 내용을 학습하세요.</p>
  </header>

  <div id="app"></div>

  <footer id="footer"></footer>
</div>

<script>
/* =====================================================================
   ★ 새 문서를 추가할 때는 이 CATEGORIES 배열만 수정하세요.

   카테고리 추가: CATEGORIES 배열에 객체 하나 추가
   문서 추가:     해당 카테고리의 topics 배열에 객체 하나 추가

   각 필드:
     id       - 카테고리 고유 키 (영문 소문자)
     label    - 섹션 헤더 배지 텍스트
     title    - 섹션 헤더 제목
     color    - 카테고리 대표 색상 (hex 또는 CSS 색상)
     glow     - 카드 hover glow (rgba)
     dim      - 카드 배경 tint (rgba)
     topics[] - 해당 카테고리 문서 목록
       href   - HTML 파일 경로
       icon   - 이모지 아이콘
       tag    - 카드 상단 작은 태그
       title  - 카드 제목
       desc   - 카드 한 줄 설명
===================================================================== */
const CATEGORIES = [
  {
    id: 'http',
    label: 'HTTP',
    title: 'HTTP 프로토콜',
    color: '#06b6d4',
    glow: 'rgba(6,182,212,0.22)',
    dim:  'rgba(6,182,212,0.08)',
    topics: [
      {
        href: 'http-versions.html',
        icon: '📄',
        tag: 'HTTP · Versions',
        title: 'HTTP 버전별 특징',
        desc: '0.9부터 3.0까지, 각 버전의 등장 배경과 핵심 개선 사항',
      },
      {
        href: 'http-vs-https.html',
        icon: '🔒',
        tag: 'HTTP · Security',
        title: 'HTTP vs HTTPS',
        desc: 'TLS 핸드셰이크, 인증서 구조, 암호화 방식 비교',
      },
      {
        href: 'HTTP 요청에서 응답까지.html',
        icon: '🔄',
        tag: 'HTTP · Flow',
        title: 'HTTP 요청-응답 흐름',
        desc: '브라우저가 서버에 요청을 보내고 응답을 받기까지의 전체 흐름',
      },
      {
        href: 'restful-api.html',
        icon: '🎯',
        tag: 'HTTP · API',
        title: 'RESTful API',
        desc: 'REST 6가지 제약 조건, 리소스 설계, 상태 코드 활용',
      },
    ],
  },
  {
    id: 'tcp',
    label: 'TCP/UDP',
    title: '전송 계층',
    color: '#3b82f6',
    glow: 'rgba(59,130,246,0.22)',
    dim:  'rgba(59,130,246,0.08)',
    topics: [
      {
        href: 'tcp-vs-udp.html',
        icon: '⚖️',
        tag: 'Transport · Compare',
        title: 'TCP vs UDP 비교',
        desc: '신뢰성, 연결 방식, 흐름 제어, 혼잡 제어 등 핵심 차이',
      },
      {
        href: 'tcp-handshake.html',
        icon: '🤝',
        tag: 'TCP · Connection',
        title: 'TCP 3-Way Handshake',
        desc: 'SYN / SYN-ACK / ACK 연결 수립 및 4-Way 연결 해제 과정',
      },
    ],
  },
  {
    id: 'security',
    label: 'Security',
    title: '보안 & 인증',
    color: '#a855f7',
    glow: 'rgba(168,85,247,0.22)',
    dim:  'rgba(168,85,247,0.08)',
    topics: [
      {
        href: 'jwt-deep-dive.html',
        icon: '🎫',
        tag: 'Auth · JWT',
        title: 'JWT (JSON Web Token)',
        desc: '헤더·페이로드·서명 구조, 검증 흐름, 보안 고려사항',
      },
      {
        href: 'session-jwt-storage.html',
        icon: '💾',
        tag: 'Auth · Storage',
        title: 'Session vs JWT 저장',
        desc: 'Cookie, LocalStorage, SessionStorage 저장 방식과 XSS/CSRF 대응',
      },
      {
        href: 'cors-deep-dive.html',
        icon: '🚨',
        tag: 'Security · CORS',
        title: 'CORS 심화',
        desc: 'Preflight 요청, Same-Origin Policy, 허용 헤더 설정 방법',
      },
    ],
  },
  {
    id: 'dns',
    label: 'DNS',
    title: 'DNS & 이름 해석',
    color: '#22c55e',
    glow: 'rgba(34,197,94,0.22)',
    dim:  'rgba(34,197,94,0.08)',
    topics: [
      {
        href: 'dns.html',
        icon: '📍',
        tag: 'DNS · Resolution',
        title: 'DNS 동작 원리',
        desc: '재귀 쿼리, 반복 쿼리, 캐싱 구조, Root/TLD/권한 네임서버',
      },
    ],
  },
];

/* =====================================================================
   아래는 렌더링 코드입니다. 일반적으로 수정할 필요 없습니다.
===================================================================== */
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderSummary(categories) {
  const items = categories.map((cat, i) => {
    const divider = i < categories.length - 1
      ? `<div class="summary-divider"></div>`
      : '';
    return `
      <div class="summary-item">
        <span class="summary-num" style="color:${cat.color}">${cat.topics.length}</span>
        <span class="summary-label">${cat.title}</span>
      </div>
      ${divider}
    `;
  }).join('');
  return `<div class="summary-bar">${items}</div>`;
}

function renderCategory(cat, index) {
  const delay = (0.3 + index * 0.15).toFixed(2);

  const cards = cat.topics.map(t => `
    <a href="${t.href}" class="topic-card" style="
      border-top: 2px solid ${cat.color};
    " onmouseover="this.style.boxShadow='0 0 32px ${cat.glow}, 0 8px 32px rgba(0,0,0,0.5)'; this.querySelector('.overlay').style.opacity='1'; this.querySelector('.card-arrow').style.color='${cat.color}'"
       onmouseout="this.style.boxShadow=''; this.querySelector('.overlay').style.opacity='0'; this.querySelector('.card-arrow').style.color=''">
      <div class="overlay" style="
        position:absolute; inset:0; border-radius:14px;
        background:${cat.dim}; opacity:0; transition:opacity .25s; pointer-events:none;
      "></div>
      <span class="card-tag">${t.tag}</span>
      <span class="card-icon">${t.icon}</span>
      <div class="card-title">${t.title}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-arrow">바로가기 <span>→</span></div>
    </a>
  `).join('');

  return `
    <div class="category anim" style="animation-delay:${delay}s">
      <div class="section-header">
        <span class="section-label" style="color:${cat.color}; border-color:${hexToRgba(cat.color, 0.3)}">${cat.label}</span>
        <span class="section-title" style="color:${cat.color}">${cat.title}</span>
        <div class="section-line"></div>
      </div>
      <div class="card-grid">${cards}</div>
    </div>
  `;
}

function render() {
  const totalDocs = CATEGORIES.reduce((s, c) => s + c.topics.length, 0);

  const badge = `
    <div class="category-badge" style="
      background: rgba(59,130,246,0.08);
      border-color: rgba(59,130,246,0.2);
      opacity:0; animation: fadeUp .6s ease forwards .7s;
    ">
      <div class="badge-dot" style="background:#3b82f6; box-shadow:0 0 8px rgba(59,130,246,0.4)"></div>
      <span class="badge-text" style="color:#3b82f6">CATEGORY · 네트워크 (NETWORK)</span>
    </div>
  `;

  const summary = `
    <div class="summary-bar" style="opacity:0; animation: fadeUp .6s ease forwards .9s">
      ${CATEGORIES.map((cat, i) => `
        <div class="summary-item">
          <span class="summary-num" style="color:${cat.color}">${cat.topics.length}</span>
          <span class="summary-label">${cat.title}</span>
        </div>
        ${i < CATEGORIES.length - 1 ? '<div class="summary-divider"></div>' : ''}
      `).join('')}
    </div>
  `;

  const sections = CATEGORIES.map((cat, i) => renderCategory(cat, i)).join('');

  document.getElementById('app').innerHTML = badge + summary + sections;

  document.getElementById('footer').innerHTML = `
    <div class="footer-left">interview-prep / network · 총 ${totalDocs}개 주제</div>
    <div class="footer-right">마지막 업데이트: 2026년 3월</div>
  `;
}

render();
</script>
</body>
</html>
